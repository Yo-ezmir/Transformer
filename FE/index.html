<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT Text Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-2xl">
        <h1 class="text-3xl font-bold mb-2 text-center text-cyan-400">Decoder Only Transformer</h1>
        <p class="text-center text-gray-400 mb-6">GPT from scratch - BERT or Character model</p>
        
        <!-- Model Selector -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-400 mb-2">Model Type:</label>
            <select id="model-select" class="w-full p-2 bg-gray-700 border border-gray-600 rounded-md">
                <option value="bert">BERT Model (Better quality)</option>
                <option value="character">Character Model (Matches PDF)</option>
            </select>
        </div>

        <!-- Output Area -->
        <div class="mt-4">
            <label class="block text-sm font-medium text-gray-400 mb-2">Generated Text:</label>
            <div id="output-area" class="w-full p-4 bg-gray-900 rounded-md min-h-[200px] text-gray-300 whitespace-pre-wrap border border-gray-700">
                Ready...
            </div>
        </div>

        <!-- Input Area -->
        <label class="block text-sm font-medium text-gray-400 mb-2 mt-4">Prompt:</label>
        <textarea id="prompt-input" rows="2" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-md text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-500" placeholder="The story begins..."></textarea>

        <!-- Buttons -->
        <div class="flex gap-4 mt-4">
            <button id="finish-btn" class="flex-1 bg-cyan-600 hover:bg-cyan-700 text-white font-semibold py-3 px-4 rounded-md transition-all">
                Generate Text
            </button>
            <button id="eval-btn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-md transition-all">
                Evaluate Model
            </button>
        </div>
    </div>

    <script>
        const promptInput = document.getElementById('prompt-input');
        const modelSelect = document.getElementById('model-select');
        const finishBtn = document.getElementById('finish-btn');
        const evalBtn = document.getElementById('eval-btn');
        const outputArea = document.getElementById('output-area');
        
        const API_URL = 'http://127.0.0.1:8000/api';

        async function handleGenerate() {
            let prompt = promptInput.value || "The";
            const modelType = modelSelect.value;
            
            finishBtn.disabled = true;
            finishBtn.textContent = "Generating...";
            outputArea.textContent = 'Generating...';
            
            try {
                const url = `${API_URL}/finishtext?prompt=${encodeURIComponent(prompt)}&model=${modelType}`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                outputArea.textContent = data.generated_text || data.error || 'No response';
            } catch (error) {
                outputArea.textContent = `Error: ${error.message}\n\nMake sure Django server is running on port 8000`;
            } finally {
                finishBtn.disabled = false;
                finishBtn.textContent = "Generate Text";
            }
        }

        async function handleEvaluate() {
            const modelType = modelSelect.value;
            
            evalBtn.disabled = true;
            evalBtn.textContent = "Evaluating...";
            outputArea.textContent = 'Evaluating model...';
            
            try {
                const url = `${API_URL}/evaluate?model=${modelType}`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                outputArea.textContent = `=== Model Evaluation ===\n\nModel: ${modelType}\nPerplexity: ${data.perplexity}\nLoss: ${data.loss}\n\n${data.note || ''}`;
            } catch (error) {
                outputArea.textContent = `Error: ${error.message}`;
            } finally {
                evalBtn.disabled = false;
                evalBtn.textContent = "Evaluate Model";
            }
        }

        finishBtn.addEventListener('click', handleGenerate);
        evalBtn.addEventListener('click', handleEvaluate);
    </script>
</body>
</html>
